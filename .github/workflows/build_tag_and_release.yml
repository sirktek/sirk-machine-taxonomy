# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build, tag and release Java project

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-22.04
    permissions:
      contents: write  # Required for creating Git tags
      packages: write
      attestations: write
      id-token: write
    steps:
    - uses: actions/checkout@v4

    # Initial setup uses 'github' server so the test step can pull
    # taxonomy-commons from GitHub Packages (GH Packages requires auth
    # even for public reads).
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'
        cache: maven
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - name: Test with Maven
      run: ./mvnw clean -U test -Drevision=1.${{github.run_number}}
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Configure Git
      run: git config --global --add safe.directory /github/workspace
    - name: Git tag
      uses: cardinalby/git-tag-action@master
      env:
        TAG: 3.${{github.run_number}}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Set Release Version
      run: |
        VERSION="3.${{github.run_number}}"
        echo "Setting version to: $VERSION"
        ./mvnw versions:set -DnewVersion=$VERSION --batch-mode --no-transfer-progress
        echo "Version updated in pom.xml:"
        grep -A1 -B1 "<version>" pom.xml | head -3
    - name: Verify Release Version
      run: |
        VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "Maven project version: $VERSION"
        if [[ $VERSION == *"SNAPSHOT"* ]]; then
          echo "ERROR: Cannot deploy SNAPSHOT version to Maven Central"
          exit 1
        fi

    # --- Publish to GitHub Packages (fast: artifacts available within seconds) ---
    - name: Publish to GitHub Packages
      run: ./mvnw deploy -P github-packages -Dmaven.test.skip --batch-mode --no-transfer-progress
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # --- Publish to Maven Central (slow: validation/indexing takes 15-30+ min) ---
    - name: Configure Maven settings for Maven Central
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'
        cache: maven
        server-id: central
        server-username: MAVEN_USERNAME # env variable for username in deploy
        server-password: MAVEN_CENTRAL_TOKEN # env variable for token in deploy
        gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }} # Value of the GPG private key to import
        gpg-passphrase: MAVEN_GPG_PASSPHRASE # env variable for GPG private key passphrase
    - name: Publish to Maven Central
      run: ./mvnw clean deploy -P deployment -Dmaven.test.skip --batch-mode --no-transfer-progress
      env:
        MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
